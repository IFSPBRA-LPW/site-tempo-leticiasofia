<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>
    <header class="header">Weather now</header>

    <main class="main">
        <h1>How's the sky looking today?</h1>

        <section class="search">
            <form>
                <input type="text" name="place" placeholder="Search for a place..." required>
                <button class="button" type="submit">Search</button>
            </form>
        </section>

        <section class="today-weather">
            <h2 id="city"></h2>
            <p id="date"></p>
            <p id="temperatura-principal"></p>
        </section>

        <article class="stats">
            <section>
                <p>Feels like</p>
                <h3 id="feels"></h3>
            </section>

            <section>
                <p>Humidity</p>
                <h3 id="humidity"></h3>
            </section>

            <section>
                <p>Wind</p>
                <h3 id="wind"></h3>
            </section>

            <section>
                <p>Precipitation</p>
                <h3 id="rain"></h3>
            </section>
        </article>

        <article class="daily" id="daily">
            <p class="titulo-secao">Daily Forecast</p>
        </article>

        <section class="hourly" id="hourly">
            <p class="titulo-secao">Hourly forecast</p>
        </section>
    </main>

    <script type="module" src="scripts/index.js" defer></script>
</body>
</html>
